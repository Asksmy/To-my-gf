<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#050508">
    <title>HOME</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/index.css">
</head>
<body>
    <div id="start-screen">
        <div class="start-horizon"></div>
        <div class="start-text">
            <span>Ven.</span>
            <span>Todavía hay cielo por recordar.</span>
        </div>
    </div>

    <!-- The Sunset Background Layer -->
    <div id="sunset-bg"></div>

    <!-- The Universe Canvas Layer -->
    <canvas id="universe-canvas"></canvas>

    <!-- Emotion Tint Overlay (colored wash over the canvas for sunset/mood effects) -->
    <div id="emotion-tint"></div>

    <!-- Dim overlay for the final letter -->
    <div id="dim-overlay"></div>

    <!-- UI Overlay for Narration -->
    <div id="ui-layer">
        <!-- A quiet hint that fades once exploration begins -->
        <div id="explore-hint">Cuando una luz te llame, quédate.</div>
        <!-- Voice of Memories -->
        <div id="narration-container"></div>
        <!-- Voice of the Universe -->
        <div id="universe-narration"></div>
    </div>

    <!-- Final Letter Overlay -->
    <div id="final-letter"></div>

    <!-- Epilogue Inscription -->
    <div id="epilogue">28 · 04 · &infin;</div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script type="module" src="src/main.js"></script>
</body>
</html>
